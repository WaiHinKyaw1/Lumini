
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Public+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans+Myanmar:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0A0A0A',
                        midnight: '#121212',
                        paper: '#F5F5F5',
                        accent: {
                            DEFAULT: '#E11D48',
                            hover: '#BE123C',
                            muted: '#4C0519',
                        },
                        text: {
                            primary: '#FAFAFA',
                            secondary: '#A3A3A3',
                            muted: '#737373',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.6;
        }
        
        /* Dark Mode Glass */
        .dark .glass { 
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Light Mode Glass/Card */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.02);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-h1 {
            font-size: 20px;
            font-weight: 700;
            color: #FAFAFA;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .movie-h2 {
            font-size: 16px;
            font-weight: 600;
            color: #FAFAFA;
            margin-bottom: 8px;
        }

        .movie-body {
            font-size: 14px;
            font-weight: 400;
            color: #A3A3A3;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .movie-meta {
            font-size: 12px;
            font-weight: 500;
            color: #737373;
            margin-bottom: 8px;
        }

        .gradient-text { 
            background: linear-gradient(135deg, #E11D48 0%, #FB7185 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #1f1f1f; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #2f2f2f; }

        /* Ensure Myanmar text has enough line height to prevent clipping */
        input, textarea, select, p, span, h1, h2, h3, h4 {
            line-height: 1.6;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body class="bg-paper text-slate-800 dark:bg-obsidian dark:text-zinc-100 selection:bg-indigo-500/30">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
